<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>Favorite fruit start</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>

  <body>
    <header>
      <h1>My Library</h1>
    </header>

    <div class="container"></div>

    <div class="addNewBookButton">
      <button id="showBtn">Add book</button>
    </div>

    <dialog id="bookDialog">
      <form method="dialog">
        <label>Title:</label>
        <input
          type="text"
          id="titleInput"
          required
          oninvalid="this.setCustomValidity('Название не может быть пустым!')"
          oninput="this.setCustomValidity('')"
        />

        <label>Author:</label>
        <input
          type="text"
          id="authorInput"
          required
          oninvalid="this.setCustomValidity('Заполните ФИО автора')"
          oninput="this.setCustomValidity('')"
        />

        <label>Pages:</label>
        <input type="number" id="pagesInput" min="1" required/>

        <div class="okBtn">
          <button value="cancel" id="confirn">Cancel</button>
          <button value="confirm">Confirm</button>
        </div>
      </form>
    </dialog>
  </body>
</html>
